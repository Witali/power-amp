  <polyline points="1395,690 1395,720 1385,728 1405,744 1385,760 1405,776 1385,792 1395,800" class="wire"/>
  <text x="1328" y="756" class="small">RL 8R</text>
  <line x1="1395" y1="800" x2="1395" y2="830" class="wire"/>
  <line x1="1373" y1="830" x2="1417" y2="830" class="wire"/>
  <line x1="1381" y1="842" x2="1409" y2="842" class="wire"/>
  <line x1="1389" y1="854" x2="1401" y2="854" class="wire"/>

  <!-- Zobel -->
  <line x1="1505" y1="420" x2="1505" y2="720" class="wire"/>
  <polyline points="1505,720 1495,728 1515,744 1495,760 1515,776 1495,792 1505,800" class="wire"/>
  <text x="1518" y="768" class="small">RZ 10R</text>
  <line x1="1505" y1="800" x2="1505" y2="835" class="wire"/>
  <line x1="1490" y1="835" x2="1520" y2="835" class="wire"/>
  <line x1="1490" y1="855" x2="1520" y2="855" class="wire"/>
  <line x1="1505" y1="855" x2="1505" y2="875" class="wire"/>
  <text x="1518" y="848" class="small">CZ 100n</text>
  <line x1="1483" y1="875" x2="1527" y2="875" class="wire"/>
  <line x1="1491" y1="887" x2="1519" y2="887" class="wire"/>
  <line x1="1499" y1="899" x2="1511" y2="899" class="wire"/>

  <!-- Notes -->
  <rect x="65" y="775" width="510" height="82" class="comp"/>
  <text x="85" y="807" class="note">No global feedback</text>
  <text x="85" y="832" class="small">OUT only goes to relay/load and Zobel network.</text>
  <text x="85" y="854" class="small">There is no wire back to IN, Q1 base, or Q2 base.</text>

  <rect x="825" y="735" width="455" height="92" class="comp"/>
  <text x="845" y="767" class="note">What is still local feedback?</text>
  <text x="845" y="792" class="small">Emitter/source degeneration and emitter resistors:</text>
  <text x="845" y="814" class="small">RE1, RE2, RE6, RE7, plus base stopper resistors.</text>

  <text x="55" y="972" class="tiny">Starting topology only. Final resistor values, compensation, protection, thermal coupling, SOA limiting, and PCB layout must be simulated and measured.</text>
</svg>
