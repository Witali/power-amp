<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .wire { stroke:#111; stroke-width:2.4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke:#111; stroke-width:1.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .bus { stroke:#111; stroke-width:3; fill:none; stroke-linecap:round; }
      .comp { stroke:#111; stroke-width:2; fill:#fff; }
      .q { stroke:#111; stroke-width:2.2; fill:#fff; rx:6; }
      .dot { fill:#111; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size:18px; fill:#111; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size:15px; fill:#111; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size:13px; fill:#111; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size:28px; font-weight:700; fill:#111; }
      .stage { font-family: Arial, Helvetica, sans-serif; font-size:18px; font-weight:700; fill:#111; }
      .pin { font-family: Arial, Helvetica, sans-serif; font-size:12px; font-weight:700; fill:#111; }
      .note { font-family: Arial, Helvetica, sans-serif; font-size:16px; font-weight:700; fill:#111; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="#fff"/>
  <text x="54" y="48" class="title">No-Overall-Feedback Audio Power Amplifier, Cascoded VAS</text>
  <text x="54" y="74" class="small">Conceptual connection schematic. Local degeneration is used; no OUT-to-input global feedback path is present.</text>

  <!-- rails -->
  <line x1="55" y1="105" x2="1545" y2="105" class="bus"/>
  <line x1="55" y1="915" x2="1545" y2="915" class="bus"/>
  <text x="60" y="96" class="text">+VCC</text>
  <text x="60" y="944" class="text">-VCC</text>

  <!-- Stage captions -->
  <text x="95" y="155" class="stage">Input buffer</text>
  <text x="500" y="155" class="stage">Cascoded voltage gain stage</text>
  <text x="880" y="155" class="stage">Bias and drivers</text>
  <text x="1260" y="155" class="stage">Power output</text>

  <!-- INPUT -->
  <text x="58" y="463" class="text">IN</text>
  <line x1="95" y1="455" x2="135" y2="455" class="wire"/>
  <!-- C1 -->
  <line x1="145" y1="425" x2="145" y2="485" class="wire"/>
  <line x1="165" y1="425" x2="165" y2="485" class="wire"/>
  <line x1="165" y1="455" x2="215" y2="455" class="wire"/>
  <text x="132" y="412" class="small">C1 2.2u</text>
  <!-- R1 input to ground -->
  <circle cx="215" cy="455" r="4" class="dot"/>
  <polyline points="215,455 215,500 205,508 225,524 205,540 225,556 205,572 215,580 215,620" class="wire"/>
  <text x="228" y="544" class="small">R1 47k</text>
  <line x1="193" y1="620" x2="237" y2="620" class="wire"/>
  <line x1="201" y1="632" x2="229" y2="632" class="wire"/>
  <line x1="209" y1="644" x2="221" y2="644" class="wire"/>
  <!-- R2 -->
  <polyline points="215,455 250,455 258,445 274,465 290,445 306,465 322,445 330,455 350,455" class="wire"/>
  <text x="258" y="432" class="small">R2 1k</text>

  <!-- Q1 pin-labelled transistor -->
  <rect x="350" y="380" width="95" height="140" class="q"/>
  <text x="372" y="424" class="small">Q1</text>
  <text x="363" y="445" class="tiny">BC550C</text>
  <text x="361" y="466" class="tiny">NPN EF</text>
  <line x1="350" y1="455" x2="330" y2="455" class="wire"/>
  <text x="356" y="459" class="pin">B</text>
  <line x1="397" y1="380" x2="397" y2="105" class="wire"/>
  <text x="403" y="394" class="pin">C</text>
  <line x1="445" y1="495" x2="495" y2="495" class="wire"/>
  <text x="428" y="499" class="pin">E</text>
  <circle cx="495" cy="495" r="4" class="dot"/>
  <!-- Q1 emitter resistor -->
  <polyline points="495,495 495,560 485,568 505,584 485,600 505,616 485,632 495,640 495,915" class="wire"/>
  <text x="512" y="602" class="small">RE1 22k</text>
  <!-- C2 from buffer to VAS input -->
  <line x1="495" y1="495" x2="530" y2="495" class="wire"/>
  <line x1="540" y1="465" x2="540" y2="525" class="wire"/>
  <line x1="560" y1="465" x2="560" y2="525" class="wire"/>
  <line x1="560" y1="495" x2="610" y2="495" class="wire"/>
  <text x="526" y="452" class="small">C2 4.7u</text>
  <!-- VAS base leak -->
  <circle cx="610" cy="495" r="4" class="dot"/>
  <polyline points="610,495 610,535 600,543 620,559 600,575 620,591 600,607 610,615 610,650" class="wire"/>
  <text x="626" y="577" class="small">R3 47k</text>
  <line x1="588" y1="650" x2="632" y2="650" class="wire"/>
  <line x1="596" y1="662" x2="624" y2="662" class="wire"/>
  <line x1="604" y1="674" x2="616" y2="674" class="wire"/>

  <!-- VAS Q2 -->
  <rect x="650" y="450" width="105" height="120" class="q"/>
  <text x="682" y="494" class="small">Q2</text>
  <text x="667" y="515" class="tiny">MJE340</text>
  <text x="666" y="536" class="tiny">VAS NPN</text>
  <line x1="650" y1="495" x2="610" y2="495" class="wire"/>
  <text x="657" y="499" class="pin">B</text>
  <line x1="702" y1="450" x2="702" y2="410" class="wire"/>
  <text x="708" y="464" class="pin">C</text>
  <line x1="702" y1="570" x2="702" y2="615" class="wire"/>
  <text x="708" y="560" class="pin">E</text>

  <!-- Cascode Q3 -->
  <rect x="650" y="270" width="105" height="120" class="q"/>
  <text x="682" y="314" class="small">Q3</text>
  <text x="667" y="335" class="tiny">MJE340</text>
  <text x="665" y="356" class="tiny">cascode</text>
  <line x1="702" y1="390" x2="702" y2="410" class="wire"/>
  <text x="708" y="379" class="pin">E</text>
  <line x1="702" y1="270" x2="702" y2="230" class="wire"/>
  <text x="708" y="284" class="pin">C</text>
  <line x1="650" y1="330" x2="585" y2="330" class="wire"/>
  <text x="657" y="334" class="pin">B</text>
  <circle cx="702" cy="230" r="5" class="dot"/>
  <text x="716" y="236" class="text">VAS_OUT</text>

  <!-- Cascode base reference -->
  <circle cx="585" cy="330" r="4" class="dot"/>
  <polyline points="585,105 585,155 575,163 595,179 575,195 595,211 575,227 585,235 585,330" class="wire"/>
  <text x="602" y="203" class="small">R4 56k</text>
  <polyline points="585,330 585,370 575,378 595,394 575,410 595,426 575,442 585,450 585,490" class="wire"/>
  <text x="602" y="414" class="small">R5 18k</text>
  <line x1="563" y1="490" x2="607" y2="490" class="wire"/>
  <line x1="571" y1="502" x2="599" y2="502" class="wire"/>
  <line x1="579" y1="514" x2="591" y2="514" class="wire"/>
  <text x="514" y="322" class="small">VCAS</text>
  <line x1="545" y1="330" x2="545" y2="405" class="wire"/>
  <line x1="530" y1="405" x2="560" y2="405" class="wire"/>
  <line x1="530" y1="425" x2="560" y2="425" class="wire"/>
  <line x1="545" y1="425" x2="545" y2="490" class="wire"/>
  <text x="486" y="399" class="small">C3 100n</text>

  <!-- VAS emitter degeneration and current sink -->
  <polyline points="702,615 702,640 692,648 712,664 692,680 712,696 692,712 702,720 702,740" class="wire"/>
  <text x="720" y="684" class="small">RE2 150R</text>
  <rect x="650" y="740" width="105" height="115" class="q"/>
  <text x="682" y="782" class="small">Q12</text>
  <text x="667" y="803" class="tiny">MJE340</text>
  <text x="664" y="824" class="tiny">I sink</text>
  <line x1="702" y1="740" x2="702" y2="740" class="wire"/>
  <text x="708" y="754" class="pin">C</text>
  <line x1="702" y1="855" x2="702" y2="875" class="wire"/>
  <text x="708" y="846" class="pin">E</text>
  <line x1="650" y1="800" x2="590" y2="800" class="wire"/>
  <text x="657" y="804" class="pin">B</text>
  <polyline points="702,875 702,890 692,898 712,914 702,915" class="wire"/>
  <text x="720" y="905" class="small">R16 set</text>
  <!-- NPN reference for sink -->
  <rect x="450" y="760" width="105" height="80" class="q"/>
  <text x="471" y="795" class="small">Q13,Q14</text>
  <text x="464" y="816" class="tiny">NPN diode refs</text>
  <line x1="555" y1="800" x2="590" y2="800" class="wire"/>
  <polyline points="502,760 502,710 492,702 512,686 492,670 512,654 502,646 502,620" class="wire"/>
  <text x="520" y="690" class="small">R17 set</text>
  <line x1="502" y1="620" x2="502" y2="105" class="wire"/>
  <line x1="502" y1="840" x2="502" y2="915" class="wire"/>

  <!-- PNP current source load -->
  <rect x="780" y="170" width="105" height="115" class="q"/>
  <text x="812" y="214" class="small">Q8</text>
  <text x="797" y="235" class="tiny">MJE350</text>
  <text x="795" y="256" class="tiny">I source</text>
  <line x1="832" y1="170" x2="832" y2="150" class="wire"/>
  <text x="838" y="184" class="pin">E</text>
  <polyline points="832,150 832,135 822,127 842,111 832,105" class="wire"/>
  <text x="850" y="136" class="small">R8 set</text>
  <line x1="832" y1="285" x2="832" y2="310" class="wire"/>
  <line x1="832" y1="310" x2="702" y2="230" class="wire"/>
  <text x="838" y="276" class="pin">C</text>
  <line x1="885" y1="225" x2="940" y2="225" class="wire"/>
  <text x="866" y="229" class="pin">B</text>
  <!-- PNP reference -->
  <rect x="970" y="185" width="105" height="80" class="q"/>
  <text x="991" y="220" class="small">Q9,Q10</text>
  <text x="984" y="241" class="tiny">PNP diode refs</text>
  <line x1="940" y1="225" x2="970" y2="225" class="wire"/>
  <line x1="1022" y1="185" x2="1022" y2="105" class="wire"/>
  <polyline points="1022,265 1022,310 1012,318 1032,334 1012,350 1032,366 1012,382 1022,390 1022,915" class="wire"/>
  <text x="1039" y="346" class="small">R9 set</text>

  <!-- VAS to bias top node -->
  <polyline points="702,230 780,230 788,220 804,240 820,220 836,240 852,220 860,230 930,230" class="wire"/>
  <text x="786" y="210" class="small">R10 100R</text>
  <circle cx="930" cy="230" r="5" class="dot"/>
  <text x="895" y="215" class="small">TOP_BIAS</text>

  <!-- Vbe multiplier -->
  <line x1="930" y1="230" x2="930" y2="360" class="wire"/>
  <rect x="880" y="360" width="105" height="95" class="q"/>
  <text x="902" y="397" class="small">QBIAS</text>
  <text x="896" y="418" class="tiny">BD139</text>
  <text x="892" y="439" class="tiny">on heatsink</text>
  <line x1="930" y1="360" x2="930" y2="360" class="wire"/>
  <text x="936" y="374" class="pin">C</text>
  <line x1="930" y1="455" x2="930" y2="595" class="wire"/>
  <text x="936" y="449" class="pin">E</text>
  <line x1="880" y1="408" x2="825" y2="408" class="wire"/>
  <text x="887" y="412" class="pin">B</text>
  <!-- multiplier resistors -->
  <polyline points="825,230 825,285 815,293 835,309 815,325 835,341 815,357 825,365 825,408" class="wire"/>
  <text x="742" y="322" class="small">R12 680R</text>
  <polyline points="825,408 825,455 815,463 835,479 815,495 835,511 815,527 825,535 825,595" class="wire"/>
  <text x="742" y="500" class="small">RV1 1k</text>
  <line x1="825" y1="230" x2="930" y2="230" class="wire"/>
  <line x1="825" y1="595" x2="930" y2="595" class="wire"/>
  <circle cx="930" cy="595" r="5" class="dot"/>
  <text x="895" y="624" class="small">BOT_BIAS</text>

  <!-- Driver upper -->
  <polyline points="930,230 1025,230 1033,220 1049,240 1065,220 1081,240 1097,220 1105,230 1140,230" class="wire"/>
  <text x="1035" y="210" class="small">RB4 100R</text>
  <rect x="1140" y="185" width="105" height="115" class="q"/>
  <text x="1172" y="229" class="small">Q4</text>
  <text x="1157" y="250" class="tiny">MJE15032</text>
  <text x="1160" y="271" class="tiny">NPN drv</text>
  <line x1="1140" y1="230" x2="1105" y2="230" class="wire"/>
  <text x="1147" y="234" class="pin">B</text>
  <line x1="1192" y1="185" x2="1192" y2="105" class="wire"/>
  <text x="1198" y="199" class="pin">C</text>
  <line x1="1245" y1="280" x2="1280" y2="280" class="wire"/>
  <text x="1228" y="284" class="pin">E</text>
  <polyline points="1280,280 1295,280 1303,270 1319,290 1335,270 1351,290 1367,270 1375,280 1395,280" class="wire"/>
  <text x="1298" y="260" class="small">R18 47R</text>

  <!-- Driver lower -->
  <polyline points="930,595 1025,595 1033,585 1049,605 1065,585 1081,605 1097,585 1105,595 1140,595" class="wire"/>
  <text x="1035" y="575" class="small">RB5 100R</text>
  <rect x="1140" y="550" width="105" height="115" class="q"/>
  <text x="1172" y="594" class="small">Q5</text>
  <text x="1157" y="615" class="tiny">MJE15033</text>
  <text x="1160" y="636" class="tiny">PNP drv</text>
  <line x1="1140" y1="595" x2="1105" y2="595" class="wire"/>
  <text x="1147" y="599" class="pin">B</text>
  <line x1="1192" y1="665" x2="1192" y2="915" class="wire"/>
  <text x="1198" y="657" class="pin">C</text>
  <line x1="1245" y1="570" x2="1280" y2="570" class="wire"/>
  <text x="1228" y="574" class="pin">E</text>
  <polyline points="1280,570 1295,570 1303,560 1319,580 1335,560 1351,580 1367,560 1375,570 1395,570" class="wire"/>
  <text x="1298" y="550" class="small">R19 47R</text>

  <!-- Power outputs -->
  <rect x="1395" y="215" width="105" height="130" class="q"/>
  <text x="1427" y="260" class="small">Q6</text>
  <text x="1411" y="281" class="tiny">NJW0281</text>
  <text x="1415" y="302" class="tiny">NPN out</text>
  <line x1="1395" y1="280" x2="1375" y2="280" class="wire"/>
  <text x="1402" y="284" class="pin">B</text>
  <line x1="1448" y1="215" x2="1448" y2="105" class="wire"/>
  <text x="1454" y="229" class="pin">C</text>
  <line x1="1500" y1="325" x2="1520" y2="325" class="wire"/>
  <text x="1483" y="329" class="pin">E</text>
  <polyline points="1520,325 1535,325 1543,315 1559,335 1575,315" class="wire"/>
  <text x="1450" y="376" class="small">RE6 0.22R/5W</text>

  <rect x="1395" y="505" width="105" height="130" class="q"/>
  <text x="1427" y="550" class="small">Q7</text>
  <text x="1411" y="571" class="tiny">NJW0302</text>
  <text x="1415" y="592" class="tiny">PNP out</text>
  <line x1="1395" y1="570" x2="1375" y2="570" class="wire"/>
  <text x="1402" y="574" class="pin">B</text>
  <line x1="1448" y1="635" x2="1448" y2="915" class="wire"/>
  <text x="1454" y="627" class="pin">C</text>
  <line x1="1500" y1="525" x2="1520" y2="525" class="wire"/>
  <text x="1483" y="529" class="pin">E</text>
  <polyline points="1520,525 1535,525 1543,515 1559,535 1575,515" class="wire"/>
  <text x="1450" y="493" class="small">RE7 0.22R/5W</text>

  <!-- Output bus: use foldback to keep it within view -->
  <line x1="1575" y1="315" x2="1575" y2="420" class="wire"/>
  <line x1="1575" y1="515" x2="1575" y2="420" class="wire"/>
  <circle cx="1575" cy="420" r="5" class="dot"/>
  <text x="1515" y="412" class="text">OUT</text>

  <!-- Load and relay drawn beside output -->
  <line x1="1575" y1="420" x2="1505" y2="420" class="wire"/>
  <line x1="1505" y1="420" x2="1505" y2="690" class="wire"/>
  <line x1="1505" y1="690" x2="1435" y2="690" class="wire"/>
  <line x1="1435" y1="672" x2="1395" y2="690" class="wire"/>
