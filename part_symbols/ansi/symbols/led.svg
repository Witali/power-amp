<line x1="100" y1="44" x2="100" y2="96" class="wire"/>
<line x1="100" y1="70" x2="170" y2="70" class="wire"/>
<line x1="126" y1="38" x2="142" y2="22" class="thin"/>
<polyline points="136,22 142,22 142,28" class="thin"/>
<line x1="114" y1="22" x2="130" y2="6" class="thin"/>
<polyline points="124,6 130,6 130,12" class="thin"/>
</svg>
