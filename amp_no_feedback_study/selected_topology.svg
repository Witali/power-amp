<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <style>
      .rail { stroke:#111; stroke-width:3; fill:none; stroke-linecap:round; }
      .wire { stroke:#111; stroke-width:2.2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke:#111; stroke-width:1.4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .dash { stroke:#111; stroke-width:1.8; fill:none; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:7 6; }
      .sym { stroke:#111; stroke-width:2.2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .dot { fill:#111; }
      .callout { fill:#fff; stroke:#111; stroke-width:1.6; }
      .text { font-family:Arial, Helvetica, sans-serif; fill:#111; }
      .title { font-size:28px; font-weight:700; }
      .stage { font-size:17px; font-weight:700; }
      .label { font-size:14px; font-weight:700; }
      .small { font-size:13px; }
      .tiny { font-size:11px; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#111"/>
    </marker>
    <g id="npn">
      <circle cx="38" cy="45" r="34" class="sym"/>
      <line x1="0" y1="45" x2="22" y2="45" class="sym"/>
      <line x1="22" y1="22" x2="22" y2="68" class="sym"/>
      <line x1="22" y1="35" x2="70" y2="10" class="sym"/>
      <line x1="22" y1="55" x2="70" y2="80" class="sym" marker-end="url(#arrow)"/>
    </g>
    <g id="pnp">
      <circle cx="38" cy="45" r="34" class="sym"/>
      <line x1="0" y1="45" x2="22" y2="45" class="sym"/>
      <line x1="22" y1="22" x2="22" y2="68" class="sym"/>
      <line x1="22" y1="55" x2="70" y2="80" class="sym"/>
      <line x1="70" y1="10" x2="22" y2="35" class="sym" marker-end="url(#arrow)"/>
    </g>
    <g id="njfet">
      <circle cx="38" cy="45" r="34" class="sym"/>
      <line x1="44" y1="16" x2="44" y2="74" class="sym"/>
      <line x1="44" y1="16" x2="70" y2="10" class="sym"/>
      <line x1="44" y1="74" x2="70" y2="80" class="sym"/>
      <line x1="0" y1="45" x2="27" y2="45" class="sym" marker-end="url(#arrow)"/>
    </g>
    <g id="ground">
      <line x1="0" y1="0" x2="44" y2="0" class="wire"/>
      <line x1="8" y1="12" x2="36" y2="12" class="wire"/>
      <line x1="16" y1="24" x2="28" y2="24" class="wire"/>
    </g>
  </defs>

  <rect width="100%" height="100%" fill="#fff"/>
  <text x="55" y="48" class="text title">Selected Topology: 07. Complementary folded cascode, CFP AB output</text>
  <text x="55" y="78" class="text small">Transistor-symbol conceptual schematic. Class AB, +/-15 V rails, total gain target Av = 10, no overall output-to-input feedback.</text>

  <line x1="55" y1="112" x2="1445" y2="112" class="rail"/>
  <line x1="55" y1="790" x2="1445" y2="790" class="rail"/>
  <text x="60" y="102" class="text label">+15 V</text>
  <text x="60" y="818" class="text label">-15 V</text>

  <text x="80" y="150" class="text stage">Input / RF reference</text>
  <text x="405" y="150" class="text stage">JFET differential input</text>
  <text x="675" y="150" class="text stage">Complementary folded cascode VAS</text>
  <text x="995" y="150" class="text stage">Bias and CFP/Sziklai output</text>

  <!-- Input network -->
  <text x="58" y="366" class="text label">IN</text>
  <line x1="85" y1="362" x2="125" y2="362" class="wire"/>
  <line x1="137" y1="332" x2="137" y2="392" class="wire"/>
  <line x1="157" y1="332" x2="157" y2="392" class="wire"/>
  <line x1="157" y1="362" x2="220" y2="362" class="wire"/>
  <text x="124" y="319" class="text small">C1</text>
  <circle cx="220" cy="362" r="4" class="dot"/>
  <polyline points="220,362 220,405 210,413 230,429 210,445 230,461 210,477 220,485" class="wire"/>
  <text x="236" y="439" class="text small">R1</text>
  <line x1="220" y1="485" x2="220" y2="520" class="wire"/>
  <use href="#ground" x="198" y="520"/>
  <polyline points="220,362 255,362 263,352 279,372 295,352 311,372 327,352 335,362 365,362" class="wire"/>
  <text x="264" y="342" class="text small">R2</text>

  <!-- JFET differential pair -->
  <line x1="365" y1="362" x2="405" y2="362" class="wire"/>
  <use href="#njfet" x="405" y="300"/>
  <text x="430" y="292" class="text label">J1</text>
  <text x="425" y="405" class="text tiny">input FET</text>
  <line x1="405" y1="345" x2="365" y2="362" class="wire"/>
  <line x1="475" y1="310" x2="535" y2="280" class="wire"/>
  <line x1="475" y1="380" x2="510" y2="432" class="wire"/>

  <use href="#njfet" x="405" y="465"/>
  <text x="430" y="457" class="text label">J2</text>
  <text x="423" y="570" class="text tiny">reference FET</text>
  <line x1="405" y1="510" x2="360" y2="510" class="wire"/>
  <polyline points="360,510 335,510 327,500 311,520 295,500 279,520 263,500 255,510 238,510" class="wire"/>
  <text x="272" y="492" class="text small">R3</text>
  <line x1="238" y1="510" x2="238" y2="560" class="wire"/>
  <use href="#ground" x="216" y="560"/>
  <line x1="475" y1="475" x2="535" y2="560" class="wire"/>
  <line x1="475" y1="545" x2="510" y2="508" class="wire"/>

  <circle cx="510" cy="432" r="4" class="dot"/>
  <circle cx="510" cy="508" r="4" class="dot"/>
  <polyline points="510,432 528,432 536,422 552,442 568,422 584,442 600,422 608,432 625,432" class="wire"/>
  <polyline points="510,508 528,508 536,498 552,518 568,498 584,518 600,498 608,508 625,508" class="wire"/>
  <text x="543" y="411" class="text small">RS</text>
  <text x="543" y="548" class="text small">RS</text>

  <!-- Tail current sink -->
  <line x1="510" y1="432" x2="545" y2="470" class="wire"/>
  <line x1="510" y1="508" x2="545" y2="470" class="wire"/>
  <circle cx="545" cy="470" r="4" class="dot"/>
  <line x1="545" y1="470" x2="545" y2="610" class="wire"/>
  <use href="#npn" x="506" y="610"/>
  <text x="525" y="602" class="text label">QTAIL</text>
  <line x1="576" y1="690" x2="576" y2="722" class="wire"/>
  <polyline points="576,722 566,730 586,746 566,762 586,778 576,790" class="wire"/>
  <line x1="506" y1="655" x2="470" y2="655" class="wire"/>
  <text x="408" y="660" class="text small">tail bias</text>

  <!-- Folded cascode VAS -->
  <use href="#pnp" x="650" y="235"/>
  <text x="675" y="226" class="text label">Q3</text>
  <text x="650" y="340" class="text tiny">PNP folded cascode</text>
  <line x1="625" y1="432" x2="650" y2="280" class="wire"/>
  <line x1="720" y1="245" x2="760" y2="245" class="wire"/>
  <line x1="720" y1="315" x2="820" y2="420" class="wire"/>
  <line x1="650" y1="280" x2="610" y2="280" class="wire"/>
  <text x="575" y="268" class="text small">VCAS+</text>

  <use href="#npn" x="650" y="520"/>
  <text x="675" y="512" class="text label">Q4</text>
  <text x="650" y="625" class="text tiny">NPN folded cascode</text>
  <line x1="625" y1="508" x2="650" y2="565" class="wire"/>
  <line x1="720" y1="600" x2="760" y2="600" class="wire"/>
  <line x1="720" y1="530" x2="820" y2="420" class="wire"/>
  <line x1="650" y1="565" x2="610" y2="565" class="wire"/>
  <text x="575" y="585" class="text small">VCAS-</text>

  <use href="#pnp" x="760" y="172"/>
  <text x="785" y="164" class="text label">Q5</text>
  <text x="742" y="282" class="text tiny">PNP mirror / source</text>
  <line x1="830" y1="182" x2="830" y2="112" class="wire"/>
  <line x1="830" y1="252" x2="830" y2="420" class="wire"/>
  <line x1="760" y1="217" x2="722" y2="217" class="wire"/>
  <polyline points="722,112 722,142 712,150 732,166 712,182 732,198 722,206 722,217" class="wire"/>

  <use href="#npn" x="760" y="610"/>
  <text x="785" y="602" class="text label">Q6</text>
  <text x="744" y="724" class="text tiny">NPN mirror / sink</text>
  <line x1="830" y1="690" x2="830" y2="790" class="wire"/>
  <line x1="830" y1="620" x2="830" y2="420" class="wire"/>
  <line x1="760" y1="655" x2="722" y2="655" class="wire"/>
  <polyline points="722,655 722,682 712,690 732,706 712,722 732,738 722,746 722,790" class="wire"/>

  <circle cx="830" cy="420" r="5" class="dot"/>
  <text x="792" y="407" class="text label">VAS OUT</text>
  <polyline points="830,420 866,420 874,410 890,430 906,410 922,430 938,410 946,420 985,420" class="wire"/>
  <text x="874" y="398" class="text small">RSTOP</text>

  <!-- Vbe multiplier -->
  <line x1="985" y1="420" x2="985" y2="300" class="wire"/>
  <line x1="985" y1="420" x2="985" y2="545" class="wire"/>
  <use href="#npn" x="945" y="338"/>
  <text x="963" y="330" class="text label">QBIAS</text>
  <text x="946" y="455" class="text tiny">Vbe multiplier</text>
  <line x1="1015" y1="348" x2="1015" y2="300" class="wire"/>
  <line x1="1015" y1="418" x2="1015" y2="545" class="wire"/>
  <line x1="945" y1="383" x2="907" y2="383" class="wire"/>
  <polyline points="907,300 907,326 897,334 917,350 897,366 917,382 907,390" class="wire"/>
  <polyline points="907,390 907,430 897,438 917,454 897,470 917,486 907,545" class="wire"/>
  <line x1="907" y1="300" x2="1015" y2="300" class="wire"/>
  <line x1="907" y1="545" x2="1015" y2="545" class="wire"/>
  <circle cx="1015" cy="300" r="4" class="dot"/>
  <circle cx="1015" cy="545" r="4" class="dot"/>
  <text x="1024" y="294" class="text small">TOP BIAS</text>
  <text x="1024" y="565" class="text small">BOT BIAS</text>

  <!-- CFP / Sziklai output -->
  <use href="#pnp" x="1085" y="255"/>
  <text x="1108" y="247" class="text label">Q7</text>
  <text x="1070" y="365" class="text tiny">PNP CFP driver</text>
  <line x1="1015" y1="300" x2="1085" y2="300" class="wire"/>
  <line x1="1155" y1="265" x2="1205" y2="265" class="wire"/>
  <line x1="1155" y1="335" x2="1195" y2="420" class="wire"/>

  <use href="#npn" x="1235" y="220"/>
  <text x="1258" y="212" class="text label">Q9</text>
  <text x="1218" y="332" class="text tiny">NPN power out</text>
  <line x1="1205" y1="265" x2="1235" y2="265" class="wire"/>
  <line x1="1305" y1="230" x2="1305" y2="112" class="wire"/>
  <polyline points="1305,300 1320,300 1328,290 1344,310 1360,290 1376,310 1392,290 1400,300 1400,420" class="wire"/>
  <text x="1324" y="279" class="text small">0.22R</text>

  <use href="#npn" x="1085" y="505"/>
  <text x="1108" y="497" class="text label">Q8</text>
  <text x="1070" y="616" class="text tiny">NPN CFP driver</text>
  <line x1="1015" y1="545" x2="1085" y2="550" class="wire"/>
  <line x1="1155" y1="515" x2="1205" y2="555" class="wire"/>
  <line x1="1155" y1="585" x2="1195" y2="420" class="wire"/>

  <use href="#pnp" x="1235" y="520"/>
  <text x="1258" y="512" class="text label">Q10</text>
  <text x="1218" y="630" class="text tiny">PNP power out</text>
  <line x1="1205" y1="555" x2="1235" y2="565" class="wire"/>
  <line x1="1305" y1="600" x2="1305" y2="790" class="wire"/>
  <polyline points="1305,530 1320,530 1328,520 1344,540 1360,520 1376,540 1392,520 1400,530 1400,420" class="wire"/>
  <text x="1324" y="562" class="text small">0.22R</text>

  <circle cx="1400" cy="420" r="5" class="dot"/>
  <text x="1414" y="413" class="text label">OUT</text>
  <line x1="1195" y1="420" x2="1400" y2="420" class="wire"/>
  <path d="M1400 420 C1325 400 1235 370 1155 335" class="dash"/>
  <path d="M1400 420 C1325 450 1235 515 1155 585" class="dash"/>
  <text x="1140" y="395" class="text small">local CFP feedback only</text>

  <!-- Speaker relay, load, zobel -->
  <line x1="1400" y1="420" x2="1430" y2="420" class="wire"/>
  <line x1="1430" y1="394" x2="1430" y2="446" class="wire"/>
  <line x1="1444" y1="405" x2="1472" y2="390" class="wire"/>
  <line x1="1444" y1="446" x2="1472" y2="446" class="wire"/>
  <text x="1418" y="382" class="text small">relay</text>
  <line x1="1472" y1="446" x2="1472" y2="520" class="wire"/>
  <polyline points="1472,520 1462,528 1482,544 1462,560 1482,576 1462,592 1472,600" class="wire"/>
  <text x="1414" y="565" class="text small">RL 8R</text>
  <line x1="1472" y1="600" x2="1472" y2="642" class="wire"/>
  <use href="#ground" x="1450" y="642"/>

  <line x1="1400" y1="420" x2="1400" y2="650" class="wire"/>
  <polyline points="1400,650 1390,658 1410,674 1390,690 1410,706 1390,722 1400,730" class="wire"/>
  <text x="1340" y="695" class="text small">RZ 10R</text>
  <line x1="1400" y1="730" x2="1400" y2="760" class="wire"/>
  <line x1="1384" y1="760" x2="1416" y2="760" class="wire"/>
  <line x1="1384" y1="778" x2="1416" y2="778" class="wire"/>
  <line x1="1400" y1="778" x2="1400" y2="805" class="wire"/>
  <text x="1336" y="773" class="text small">CZ 100n</text>
  <use href="#ground" x="1378" y="805"/>

  <!-- Notes -->
  <rect x="76" y="700" width="330" height="92" class="callout"/>
  <text x="94" y="730" class="text label">No overall/global feedback</text>
  <text x="94" y="754" class="text small">OUT only goes to relay, load, and Zobel.</text>
  <text x="94" y="776" class="text small">No OUT wire returns to the input or VAS input.</text>

  <rect x="642" y="718" width="450" height="78" class="callout"/>
  <text x="660" y="748" class="text label">Behavioral snapshot from previous comparison</text>
  <text x="660" y="772" class="text small">1 W THD 0.1025%, 5 W THD 0.0501%, clean power about 9 W / 8R.</text>

  <text x="55" y="858" class="text tiny">Important: this is a topology-level schematic using transistor symbols, not a complete production SPICE/hardware schematic. Values, compensation, protection, thermal coupling, and PCB layout still need validation.</text>
</svg>
